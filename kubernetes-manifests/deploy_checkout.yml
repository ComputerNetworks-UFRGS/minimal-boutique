apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout
  namespace: minimal-boutique
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkout
  template:
    metadata:
      labels:
        app: checkout
    spec:
      # nodeName: petshopboys
      containers:
        - name: checkout
          image: ghcr.io/computernetworks-ufrgs/minimal-boutique-checkout
          ports:
            - containerPort: 5003

---

apiVersion: v1
kind: Service
metadata:
  name: checkout
  namespace: minimal-boutique
spec:
  selector:
    app: checkout
  ports:
    - protocol: TCP
      port: 5003
      targetPort: 5003
  type: ClusterIP
