apiVersion: v1
kind: ConfigMap
metadata:
  name: collector-config
  namespace: minimal-boutique
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          http:
            endpoint: 0.0.0.0:4321

    processors:
      # --- Processador de Tail Sampling (Suas regras) ---
      tail_sampling:
        decision_wait: 30s
        num_traces: 15000
        expected_new_traces_per_sec: 750
        policies:
          - name: latency-policy-500ms
            type: latency
            latency:
              threshold_ms: 500

          - name: large_traces
            type: span_count
            span_count:
              min_spans: 20

          - name: high_price_requests
            type: ottl_condition
            ottl_condition:
              span:
                - '(attributes["total"] >= 500 and attributes["total"] <= 10000000000) or (resource.attributes["total"] >= 500 and resource.attributes["total"] <= 10000000000)'

          - name: high_number_orders
            type: ottl_condition
            ottl_condition:
              span:
                - '(attributes["number.of.orders"] >= 4) or (resource.attributes["number.of.orders"] >= 4)'

          - name: errors_percent
            type: and
            and:
              and_sub_policy:
                - name: errors_policy
                  type: status_code
                  status_code:
                    status_codes: ["ERROR"]
                - name: sample_percent
                  type: probabilistic
                  probabilistic:
                    sampling_percentage: 100.0

      # --- Marcadores para diferenciar os pipelines no Elastic/Jaeger ---
      attributes/baseline:
        actions:
          - key: dataset
            value: baseline
            action: insert

      attributes/experiment:
        actions:
          - key: dataset
            value: experiment
            action: insert

    exporters:
      debug:
        verbosity: detailed
      otlphttp:
        endpoint: http://jaeger:4318
      prometheus:
        endpoint: "0.0.0.0:9464"

    service:
      pipelines:
        # Pipeline 1: Baseline (100% dos dados)
        traces/baseline:
          receivers: [otlp]
          processors: [attributes/baseline] 
          exporters: [otlphttp]

        # Pipeline 2: Experimento (Apenas as regras)
        traces/experiment:
          receivers: [otlp]
          processors: [tail_sampling, attributes/experiment]
          exporters: [otlphttp]

        metrics:
          receivers: [otlp]
          exporters: [prometheus]

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: collector
  namespace: minimal-boutique
  labels:
    app: collector
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: collector
  template:
    metadata:
      labels:
        app: collector
      annotations:
        # Hash atualizado para forçar o redeploy com a nova config
        config-hash: "fanout-test-v1"
    spec:
      nodeName: petshopboys
      containers:
        - name: collector-container
          image: otel/opentelemetry-collector-contrib:latest
          args: ["--config=/etc/otel/config.yaml"]
          ports:
            - containerPort: 4321
            - containerPort: 9464
          volumeMounts:
            - name: config-volume
              mountPath: /etc/otel/
      volumes:
        - name: config-volume
          configMap:
            name: collector-config

---
apiVersion: v1
kind: Service
metadata:
  name: collector
  namespace: minimal-boutique
spec:
  selector:
    app: collector
  ports:
    - protocol: TCP
      port: 4321
      targetPort: 4321
      name: otlp-http
    - protocol: TCP
      port: 9464
      targetPort: 9464
      name: scrape