apiVersion: apps/v1
kind: Deployment
metadata:
  name: loadgenerator
  namespace: minimal-boutique
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loadgenerator
  template:
    metadata:
      labels:
        app: loadgenerator
    spec:
      # nodeName: petshopboys
      containers:
        - name: loadgenerator
          image: ghcr.io/computernetworks-ufrgs/minimal-boutique-loadgenerator
          ports:
            - containerPort: 5009
          command:
            - locust
            - '--host'
            - http://backend.minimal-boutique.svc.cluster.local:5000
            - '--headless'
            - '-u'
            - '100'
            - '-r'
            - '10'

---

apiVersion: v1
kind: Service
metadata:
  name: loadgenerator
  namespace: minimal-boutique
spec:
  selector:
    app: loadgenerator
  ports:
    - protocol: TCP
      port: 5009
      targetPort: 5009
  type: ClusterIP
